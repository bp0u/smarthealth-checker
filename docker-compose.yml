version: '3.8'
services:
  postgres:
    image: postgres:15-alpine
    container_name: health_checker_db
    environment:
      POSTGRES_DB: health_checker
      POSTGRES_USER: healthuser
      POSTGRES_PASSWORD: ${DB_PASSWORD:-SecurePassword123}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./sql/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U healthuser -d health_checker"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - health_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: health_checker_api
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql://healthuser:${DB_PASSWORD:-SecurePassword123}@postgres:5432/health_checker}
      - SECRET_KEY=${SECRET_KEY:-your-secret-key-change-in-production}
      - REDIS_URL=redis://redis:6379
      - MODEL_PATH=/app/models/disease_prediction_model_v1.joblib
    volumes:
      - ./backend:/app
      - ./models:/app/models
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    networks:
      - health_network

  redis:
    image: redis:7-alpine
    container_name: health_checker_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - health_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: health_checker_frontend
    environment:
      - REACT_APP_API_URL=http://localhost:8000
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    networks:
      - health_network

  nginx:
    image: nginx:alpine
    container_name: health_checker_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/ssl:/etc/nginx/ssl
    depends_on:
      - frontend
      - backend
    networks:
      - health_network

volumes:
  postgres_data:
  redis_data:

networks:
  health_network:
    driver: bridge
